<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cookie Clicker Deluxe</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link href="https://fonts.cdnfonts.com/css/druk-text-wide-trial" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
</head>
<body>
  <div class="particles"></div>
  <div class="game">
    <h1 class="title animate__animated animate__bounceIn">🍪 Cookie Clicker 🍪</h1>
    <div class="counter">Кликов: <span id="clicks">0</span></div>
    <div class="stats">
      <div class="stat-box">
        <span>Сила клика</span>
        <span id="click-power">1</span>
      </div>
      <div class="stat-box">
        <span>Всего кликов</span>
        <span id="total-clicks">0</span>
      </div>
      <div class="stat-box">
        <span>Автоклики/с</span>
        <span id="auto-clicks">0</span>
      </div>
    </div>
    <div class="cookie-container">
      <button id="cookie" class="cookie-btn animate__animated">Клик!</button>
    </div>
    <div class="cookie-crumbs"></div>
    <div class="upgrades">
      <h3>Улучшения</h3>
      <div id="upgrades-container" class="upgrades-grid"></div>
    </div>
    <div class="abilities">
      <h3>Способности</h3>
      <div id="abilities-container" class="upgrades-grid"></div>
    </div>
    <div class="purchased-upgrades" id="byeImprovements">
      <h3>Купленные улучшения</h3>
      <div id="Improvements"></div>
    </div>
  </div>
  <div class="floating-cookies"></div>
  <script src="script.js"></script>
</body>
</html>
